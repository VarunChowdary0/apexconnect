      letter-spacing: 0.5px;

      display: flex;
      align-items: center;

    }
    .table-header .icon {
      width: 18px; height: 18px;

      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;

    .table-columns { padding: 2px 0; }

    .col-type { color: #8b949e; font-size: 10px; font-family: 'Cascadia Code', 'Fira Code', monospace; flex-shrink: 0; }

    .react-flow__node { transition: opacity 0.3s ease; }
    .react-flow__edge { transition: opacity 0.3s ease; }

    .header-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      background: #161b22ee;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #30363d;
      padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;

    }
    .header-bar .stats .stat-val { color: #58a6ff; font-weight: 600; }

    .legend {
      position: fixed; bottom: 16px; left: 16px; z-index: 10;
      background: #161b22ee;
      backdrop-filter: blur(12px);
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex; gap: 10px; flex-wrap: wrap;

    .legend-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .legend-divider { width: 1px; height: 18px; background: #30363d; }

    .save-modal {

        { name: 'id', type: 'UUID', pk: true },
        { name: 'workspace_id', type: 'UUID', fk: true, fkRef: 'workspaces.id' },
        { name: 'name', type: 'VARCHAR(200)' },
        { name: 'description', type: 'TEXT' },
        { name: 'status', type: 'ENUM' },
        { name: 'created_at', type: 'TIMESTAMP' },
        { name: 'updated_at', type: 'TIMESTAMP' },
      ]},
      { name: 'scrape_sources', color: '#ec4899', columns: [
        { name: 'id', type: 'UUID', pk: true },
        { name: 'workspace_id', type: 'UUID', fk: true, fkRef: 'workspaces.id' },
        { name: 'platform', type: 'ENUM' },
        { name: 'base_url', type: 'VARCHAR(255)' },
        { name: 'api_key', type: 'TEXT' },
        { name: 'is_active', type: 'BOOLEAN' },
        { name: 'created_at', type: 'TIMESTAMP' },
        { name: 'updated_at', type: 'TIMESTAMP' },
      ]},
      { name: 'scrape_jobs', color: '#ec4899', columns: [
        { name: 'id', type: 'UUID', pk: true },
        { name: 'campaign_id', type: 'UUID', fk: true, fkRef: 'scrape_campaigns.id' },
        { name: 'source_id', type: 'UUID', fk: true, fkRef: 'scrape_sources.id' },
        { name: 'name', type: 'VARCHAR(200)' },
        { name: 'role_filter', type: 'VARCHAR(200)' },
        { name: 'industry_filter', type: 'VARCHAR(200)' },
        { name: 'location_filter', type: 'VARCHAR(200)' },
        { name: 'frequency', type: 'ENUM' },
        { name: 'status', type: 'ENUM' },
        { name: 'next_run_at', type: 'TIMESTAMP' },
        { name: 'created_at', type: 'TIMESTAMP' },
        { name: 'updated_at', type: 'TIMESTAMP' },
      ]},
      { name: 'scrape_runs', color: '#ec4899', columns: [
        { name: 'id', type: 'UUID', pk: true },
        { name: 'scrape_job_id', type: 'UUID', fk: true, fkRef: 'scrape_jobs.id' },
        { name: 'status', type: 'ENUM' },
        { name: 'profiles_found', type: 'INT' },
        { name: 'started_at', type: 'TIMESTAMP' },
        { name: 'completed_at', type: 'TIMESTAMP' },
        { name: 'error_message', type: 'TEXT' },
      ]},
      { name: 'scraped_profiles', color: '#ec4899', columns: [
        { name: 'id', type: 'UUID', pk: true },
        { name: 'run_id', type: 'UUID', fk: true, fkRef: 'scrape_runs.id' },
        { name: 'platform_id', type: 'VARCHAR(255)' },
        { name: 'job_title', type: 'VARCHAR(300)' },
        { name: 'company_name', type: 'VARCHAR(200)' },
        { name: 'location', type: 'VARCHAR(200)' },
        { name: 'industry', type: 'VARCHAR(200)' },
        { name: 'job_url', type: 'VARCHAR(500)' },
        { name: 'raw_data', type: 'JSONB' },
        { name: 'created_at', type: 'TIMESTAMP' },
      ]},
      { name: 'enrichment_jobs', color: '#ec4899', columns: [
        { name: 'id', type: 'UUID', pk: true },
        { name: 'workspace_id', type: 'UUID', fk: true, fkRef: 'workspaces.id' },
        { name: 'scraped_profile_id', type: 'UUID', fk: true, fkRef: 'scraped_profiles.id' },
        { name: 'provider', type: 'ENUM' },
        { name: 'status', type: 'ENUM' },
        { name: 'requested_at', type: 'TIMESTAMP' },
        { name: 'completed_at', type: 'TIMESTAMP' },
      ]},
      { name: 'enriched_contacts', color: '#ec4899', columns: [
        { name: 'id', type: 'UUID', pk: true },
        { name: 'enrichment_job_id', type: 'UUID', fk: true, fkRef: 'enrichment_jobs.id' },
        { name: 'workspace_id', type: 'UUID', fk: true, fkRef: 'workspaces.id' },
        { name: 'email', type: 'VARCHAR(255)' },
        { name: 'first_name', type: 'VARCHAR(100)' },
        { name: 'last_name', type: 'VARCHAR(100)' },
        { name: 'company', type: 'VARCHAR(200)' },
        { name: 'title', type: 'VARCHAR(200)' },
        { name: 'phone', type: 'VARCHAR(50)' },
        { name: 'linkedin_url', type: 'VARCHAR(500)' },
        { name: 'experience', type: 'JSONB' },
        { name: 'raw_response', type: 'JSONB' },
        { name: 'created_at', type: 'TIMESTAMP' },
      ]},
      { name: 'contact_verifications', color: '#ec4899', columns: [
        { name: 'id', type: 'UUID', pk: true },
        { name: 'enriched_contact_id', type: 'UUID', fk: true, fkRef: 'enriched_contacts.id' },
        { name: 'verification_inbox_id', type: 'UUID', fk: true, fkRef: 'verification_inboxes.id' },
        { name: 'result', type: 'ENUM' },
        { name: 'bounce_type', type: 'ENUM' },
        { name: 'checked_at', type: 'TIMESTAMP' },
        { name: 'lead_id', type: 'UUID', fk: true, fkRef: 'leads.id' },
      ]},
    ];

    // ==================== MANUAL LAYOUT (grouped by subsystem) ====================
    //
    // Col 0 (x=0):   User & Workspace → Warmup chain
    // Col 1 (x=300): Inbox → Email pipeline
    // Col 2 (x=600): Campaign → Bounce/Tracking
    // Col 3 (x=900): Lead → Verification & Domain
    //

    const POSITIONS = {
      'users':                  { x: -2920, y: -387 },
      'workspaces':             { x: -2523, y: -699 },
      'workspace_members':      { x: -1796, y: 251 },
      'workspace_settings':     { x: -1685, y: 13 },
      'inboxes':                { x: -1421, y: -169 },
      'inbox_send_stats':       { x: -1044, y: 325 },
      'campaigns':              { x: -1644, y: -936 },
      'campaign_steps':         { x: -1018, y: -715 },
      'campaign_inboxes':       { x: -694, y: -1048 },
      'leads':                  { x: -1642, y: -557 },
      'lead_lists':             { x: -1931, y: -1110 },
      'lead_list_members':      { x: -1214, y: -1215 },
      'campaign_leads':         { x: -195, y: -264 },
      'scheduled_emails':       { x: -255, y: -753 },
      'email_threads':          { x: -600, y: -1307 },
      'emails':                 { x: 106, y: -1131 },
      'email_events':           { x: 588, y: -888 },
      'bounce_events':          { x: 453, y: -536 },
      'unsubscribes':           { x: 78, y: -385 },
      'warmup_profiles':        { x: -1032, y: -15 },
      'warmup_threads':         { x: -766, y: -166 },
      'warmup_messages':        { x: -459, y: 55 },
      'warmup_actions':         { x: -115, y: 276 },
      'verification_inboxes':   { x: -700, y: 391 },
      'lead_verification_logs': { x: 151, y: 113 },
      'email_domains':          { x: 314, y: -146 },
      'scrape_campaigns':       { x: -2522, y: 177 },
      'scrape_sources':         { x: -2301, y: -60 },
      'scrape_jobs':            { x: -2004, y: 381 },
      'scrape_runs':            { x: -1689, y: 465 },
      'scraped_profiles':       { x: -1385, y: 583 },
      'enrichment_jobs':        { x: -1056, y: 551 },
      'enriched_contacts':      { x: -724, y: 747 },
      'contact_verifications':  { x: -204, y: 546 },
    };

    function buildNodesAndEdges(schema) {
      const nodes = schema.map((table) => ({
        id: table.name,
        type: 'tableNode',
        position: POSITIONS[table.name] || { x: 0, y: 0 },
        data: table,
      }));

      const edges = [];
      schema.forEach((table) => {
        table.columns.forEach((col) => {
          if (col.fk && col.fkRef) {
            const [pkTable, pkCol] = col.fkRef.split('.');
            // PK (right) -------> FK (left)
            edges.push({
              id: pkTable + '.' + pkCol + '->' + table.name + '.' + col.name,
              source: pkTable,
              target: table.name,
              sourceHandle: pkTable + '-' + pkCol + '-right',
              targetHandle: table.name + '-' + col.name + '-left',
              type: 'default',
              animated: true,
              style: { stroke: '#a371f7', strokeWidth: 1.5 },
              markerEnd: { type: MarkerType.ArrowClosed, color: '#a371f7', width: 14, height: 14 },
            });
          }
        });
      });

      return { nodes, edges };
    }

    // ==================== TABLE NODE COMPONENT ====================
    const hStyle = { background: '#a371f7', width: 7, height: 7, border: '2px solid #161b22' };

    const TableNode = memo(function TableNode({ data }) {
      return html`
        <div className="table-node">
          <div className="table-header" style=${{ background: data.color || '#1f6feb' }}>
            <span className="icon">T</span>
            ${data.name}
          </div>
          <div className="table-columns">
            ${data.columns.map((col) => html`
              <div className="table-column" key=${col.name}>
                <${Handle}
                  type="target"
                  position=${Position.Left}
                  id=${data.name + '-' + col.name + '-left'}
                  style=${hStyle}
                />
                ${col.pk && html`<span className="col-badge badge-pk">PK</span>`}
                ${col.fk && html`<span className="col-badge badge-fk">FK</span>`}
                ${col.unique && html`<span className="col-badge badge-uq">UQ</span>`}
                <span className="col-name">${col.name}</span>
                <span className="col-type">${col.type}</span>
                <${Handle}
                  type="source"
                  position=${Position.Right}
                  id=${data.name + '-' + col.name + '-right'}
                  style=${hStyle}
                />
              </div>
            `)}
          </div>
        </div>
      `;
    });

    const nodeTypes = { tableNode: TableNode };

    // ==================== MAIN APP ====================
    function App() {
      const { nodes: initNodes, edges: initEdges } = useMemo(() => buildNodesAndEdges(SCHEMA), []);
      const [nodes, setNodes, onNodesChange] = useNodesState(initNodes);
      const [edges, setEdges, onEdgesChange] = useEdgesState(initEdges);
      const nodesRef = useRef(nodes);
      nodesRef.current = nodes;

      const selectedRef = useRef(null);

      const resetHighlight = useCallback(() => {
        selectedRef.current = null;
        setEdges(eds => eds.map(e => ({
          ...e,
          style: { stroke: '#a371f7', strokeWidth: 1.5 },
          animated: true,
          markerEnd: { type: MarkerType.ArrowClosed, color: '#a371f7', width: 14, height: 14 },
        })));
        setNodes(nds => nds.map(n => ({ ...n, style: undefined })));
      }, []);

      const onNodeClick = useCallback((_, node) => {
        if (selectedRef.current === node.id) { resetHighlight(); return; }
        selectedRef.current = node.id;
        const nid = node.id;
        const connEdges = new Set();
        const connNodes = new Set([nid]);
        initEdges.forEach(e => {
          if (e.source === nid || e.target === nid) {
            connEdges.add(e.id);
            connNodes.add(e.source);
            connNodes.add(e.target);
          }
        });
        setEdges(eds => eds.map(e => connEdges.has(e.id)
          ? { ...e, style: { stroke: '#58a6ff', strokeWidth: 2.5 }, animated: true,
              markerEnd: { type: MarkerType.ArrowClosed, color: '#58a6ff', width: 14, height: 14 }, zIndex: 10 }
          : { ...e, style: { stroke: '#a371f7', strokeWidth: 1.5, opacity: 0.15 }, animated: false,
              markerEnd: { type: MarkerType.ArrowClosed, color: '#a371f7', width: 14, height: 14 } }
        ));
        setNodes(nds => nds.map(n => ({
          ...n, style: connNodes.has(n.id) ? { opacity: 1 } : { opacity: 0.25 },
        })));
      }, [initEdges, resetHighlight]);

      const totalCols = SCHEMA.reduce((sum, t) => sum + t.columns.length, 0);
      const totalRelations = initEdges.length;

      const [saveData, setSaveData] = useState(null);
      const [copied, setCopied] = useState(false);

      const handleSave = useCallback(() => {
        const current = nodesRef.current;
        const maxLen = Math.max(...current.map((n) => n.id.length));
        const lines = current.map((n) => {
          const pad = ' '.repeat(maxLen - n.id.length);
          return "      '" + n.id + "':" + pad + " { x: " + Math.round(n.position.x) + ", y: " + Math.round(n.position.y) + " },";
        });
        const posBlock = "    const POSITIONS = {\n" + lines.join('\n') + "\n    };";
        console.log('=== GRAPH POSITIONS ===\n' + posBlock);
        setSaveData(posBlock);
        setCopied(false);
      }, []);

      const handleCopy = useCallback(() => {
        if (!saveData) return;
        navigator.clipboard.writeText(saveData).then(() => setCopied(true));
      }, [saveData]);

      return html`
        <div style=${{ width: '100%', height: '100%' }}>
          <div className="header-bar">
            <h1>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" strokeWidth="2">
                <ellipse cx="12" cy="6" rx="8" ry="3" />
                <path d="M4 6v6c0 1.66 3.58 3 8 3s8-1.34 8-3V6" />
                <path d="M4 12v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6" />
              </svg>
              <span>ApexConnect <span className="accent">Schema</span></span>
            </h1>
            <div className="stats">
              <span><span className="stat-val">${SCHEMA.length}</span> tables</span>
              <span><span className="stat-val">${totalCols}</span> columns</span>
              <span><span className="stat-val">${totalRelations}</span> relations</span>
              <button onClick=${handleSave} style=${{
                background: '#238636', color: '#fff', border: 'none',
                padding: '6px 14px', borderRadius: '6px', fontSize: '12px',
                fontWeight: 600, cursor: 'pointer', marginLeft: '8px',
              }}>Save</button>
            </div>
          </div>

          <${ReactFlow}
            nodes=${nodes}
            edges=${edges}
            onNodesChange=${onNodesChange}
            onEdgesChange=${onEdgesChange}
            onNodeClick=${onNodeClick}
            onPaneClick=${resetHighlight}
            nodeTypes=${nodeTypes}
            fitView=${true}
            fitViewOptions=${{ padding: 0.2 }}
            minZoom=${0.1}
            maxZoom=${2.5}
            defaultEdgeOptions=${{ type: 'default' }}
            proOptions=${{ hideAttribution: true }}
          >
            <${Background} variant=${BackgroundVariant.Dots} gap=${20} size=${1} color="#21262d" />
            <${Controls} />
            <${MiniMap}
              nodeColor=${(n) => {
                const t = SCHEMA.find(s => s.name === n.id);
                return t ? t.color : '#1f6feb';
              }}
              maskColor="rgba(0,0,0,0.7)"
              pannable=${true}
              zoomable=${true}
            />
          </${ReactFlow}>

          ${saveData && html`
            <div className="save-overlay" onClick=${() => setSaveData(null)}>
              <div className="save-modal" onClick=${(e) => e.stopPropagation()}>
                <div className="save-modal-header">
                  <h2>Node Positions</h2>
                  <span style=${{ color: '#8b949e', fontSize: '11px' }}>Replace the POSITIONS block in schema.html</span>
                </div>
                <div className="save-modal-body">
                  <pre>${saveData}</pre>
                </div>
                <div className="save-modal-footer">
                  <button className="btn-close-modal" onClick=${() => setSaveData(null)}>Close</button>
                  <button className="btn-copy" onClick=${handleCopy}>${copied ? 'Copied!' : 'Copy to Clipboard'}</button>
                </div>
              </div>
            </div>
          `}

          <div className="legend">
            <div className="legend-item"><span className="legend-swatch" style=${{ background: '#3b82f6' }}></span> User</div>
            <div className="legend-item"><span className="legend-swatch" style=${{ background: '#14b8a6' }}></span> Inbox</div>
            <div className="legend-item"><span className="legend-swatch" style=${{ background: '#8b5cf6' }}></span> Campaign</div>
            <div className="legend-item"><span className="legend-swatch" style=${{ background: '#22c55e' }}></span> Lead</div>
            <div className="legend-item"><span className="legend-swatch" style=${{ background: '#f97316' }}></span> Email</div>
            <div className="legend-item"><span className="legend-swatch" style=${{ background: '#ef4444' }}></span> Bounce</div>
            <div className="legend-item"><span className="legend-swatch" style=${{ background: '#f59e0b' }}></span> Warmup</div>
            <div className="legend-item"><span className="legend-swatch" style=${{ background: '#06b6d4' }}></span> Verify</div>
            <div className="legend-item"><span className="legend-swatch" style=${{ background: '#ec4899' }}></span> Acquisition</div>
            <span className="legend-divider"></span>
            <div className="legend-item"><span className="col-badge badge-pk">PK</span> Primary</div>
            <div className="legend-item"><span className="col-badge badge-fk">FK</span> Foreign</div>
            <div className="legend-item"><span className="col-badge badge-uq">UQ</span> Unique</div>
          </div>
        </div>
      `;
    }

    createRoot(document.getElementById('root')).render(html`<${App} />`);
  </script>
</body>
</html>
