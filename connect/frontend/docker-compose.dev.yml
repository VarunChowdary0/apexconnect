services:
  web:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./:/app:delegated
      - /app/node_modules
    ports:
      - "3000:3000"
    command: 'sh -c "npm install --legacy-peer-deps && HOST=0.0.0.0 npm run dev"'
    environment:
      - NEXT_TELEMETRY_DISABLED=1
    stdin_open: true
    tty: true
